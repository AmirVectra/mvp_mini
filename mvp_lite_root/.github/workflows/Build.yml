name: Build Python Wheel

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_wheel:
    runs-on: ubuntu-latest

    steps:
    - name: Set variables for paths
      run: |
        echo "PROJECT_PATH=./your_project_path" >> $GITHUB_ENV
        echo "BUILD_FOLDER_PATH=./your_build_folder_path" >> $GITHUB_ENV

    - name: Check out repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build the wheel
      run: |
        cd $PROJECT_PATH
        python -m build --wheel

    - name: Create build folder if it does not exist
      run: mkdir -p $BUILD_FOLDER_PATH

    - name: Move the wheel to the build folder
      run: mv $PROJECT_PATH/dist/*.whl $BUILD_FOLDER_PATH/

    - name: List files in build folder
      run: ls $BUILD_FOLDER_PATH

    - name: Commit and push wheel files
      run: |
        git config --local user.email "github-actions@github.com"
        git config --local user.name "GitHub Action"
        git add $BUILD_FOLDER_PATH/
        git commit -m "Add built wheel"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
