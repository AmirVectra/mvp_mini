[build-system]
requires = ["setuptools>=67.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project.scripts]
run_mvp_lite = "mvp_lite.mvp_lite_main:main"

[project]
name = "mvp_lite"
version = "1.1.0"
requires-python = ">=3.12"
authors = [
  { name="Amir Hamza", email="amir@vectraglobal.com" }
]
description = "This is a Sheet Alloc Program: MVP Lite for stacking OPS Views with 'N' NOPS View"

license = { text = "MIT" }
dynamic = ["dependencies"]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]

[tool.setuptools.package-data]
mvp_lite = [
    "*.yaml",
    "*.json",
    "*.pyd",
    "path_config/*.yaml",
    "path_config/*.json"
]

[tool.setuptools.dynamic]
dependencies = { file = ["requirements.txt"] }